name: Release

# Build and publish the Docker image to GHCR on a version tag (e.g. v0.7.0).
# Layered on top of ci.yml (which tests every push/PR) — tag only green `main`.
# amd64-only, so no QEMU/buildx emulation is needed.
#
# First release note: a new GHCR package is PRIVATE by default. After the first push,
# set the package visibility to Public (see CONTRIBUTING.md "Releasing") so a plain
# `docker compose up` can pull it.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/simonbrunou/cinder
          # v0.7.0 -> tags 0.7.0, 0.7, latest. `latest` is set explicitly so it
          # doesn't depend on the default-branch heuristic.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Includes org.opencontainers.image.source, which links the package to the repo.
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
