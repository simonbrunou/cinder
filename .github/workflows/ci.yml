name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      # ponytail: single version matched to dev; add a matrix here if you ever
      # support older Elixir/OTP than what you build on.
      - uses: erlef/setup-beam@v1
        id: beam
        with:
          otp-version: "29"
          elixir-version: "1.20"

      # Cache deps only — not _build — so a fresh compile each run can't pass on
      # stale beams (no incremental-compile false-greens).
      - uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-mix-

      - run: mix deps.get

      # `mix test` is the project alias: compile --warnings-as-errors,
      # format --check-formatted, credo --strict, ecto create/migrate, test.
      - run: mix test

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"

      - run: mix deps.get
      - run: mix hex.audit

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: docker build --check .
      - run: docker build -t cinder:ci .

      - name: Boot a fresh database
        run: |
          docker run --detach --name cinder-ci -p 127.0.0.1:4000:4000 \
            -e SECRET_KEY_BASE=ci-only-not-a-real-secret-key-base-0123456789abcdefghijklmnopqrstuvwxyz \
            -e DATABASE_PATH=/data/cinder.db \
            -e CINDER_BOOTSTRAP_TOKEN=ci-only-not-a-real-bootstrap-token \
            cinder:ci
          trap 'docker logs cinder-ci; docker rm --force cinder-ci' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4000/healthz && exit 0
            sleep 1
          done
          exit 1

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cinder:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
