# Cinder — self-hosted movies + TV request / download / import.
#
# Quickstart:
#   cp .env.example .env
#   echo "SECRET_KEY_BASE=$(openssl rand -base64 48)" >> .env
#   mkdir -p media/{movies,tv,downloads} && sudo chown -R 65534:65534 media
#   docker compose up --build      # builds the image locally on first run
# Then open http://localhost:4000 and create your admin in the first-run wizard.
#
# The chown step matters: Cinder runs as `nobody` (uid 65534) and the ./media bind mount keeps host
# ownership, so without it the onboarding wizard can't create/write the library roots and won't
# finish (and later imports would fail with EACCES). The /data DB volume is handled by the image.

services:
  cinder:
    # `build: .` builds from this repo (works before any image is published, and is
    # what `--build` rebuilds). Once you pull a published release you can drop `build:`
    # and pin a tag, e.g.  image: ghcr.io/simonbrunou/cinder:0.7.0
    image: ghcr.io/simonbrunou/cinder:latest
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      # Boot-only config — stays in env (needed before the in-app settings store is up).
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in .env (openssl rand -base64 48)}
      DATABASE_PATH: /data/cinder.db
      PHX_SERVER: "true"
      PORT: "4000"
      PHX_HOST: ${PHX_HOST:-localhost}
      # Library roots — a separate root per kind (a media server wants Movies/Shows split). Both
      # are required; editable later in /settings (a DB value overrides this bootstrap).
      MOVIES_LIBRARY_PATH: /media/movies
      TV_LIBRARY_PATH: /media/tv
    volumes:
      - cinder_data:/data              # SQLite DB + WAL (named volume; survives recreate)
      - ${MEDIA_ROOT:-./media}:/media  # library + downloads — see the hardlink note below

# Everything else (TMDB / Prowlarr / qBittorrent / SABnzbd / Jellyfin / Plex) is set in the
# first-run wizard, not here — Cinder reaches them by URL (e.g. http://prowlarr:9696 when they
# share this compose network).
#
# HARDLINK REQUIREMENT: Cinder hardlinks finished downloads into the library, and a hardlink
# cannot cross filesystems. Keep the library and the download client's completed dir under one
# mount:
#   /media/movies      <- MOVIES_LIBRARY_PATH (movies import here)
#   /media/tv          <- TV_LIBRARY_PATH    (episodes import here)
#   /media/downloads   <- point your download client's completed dir here
#
# Example wiring (uncomment + adjust, and uncomment the matching named volumes below).
# NOTE: Cinder runs as `nobody` (uid/gid 65534). Give the download client a matching PUID/PGID
# (or a shared group with group write) or hardlinks fail with EACCES and items park
# as :import_failed.
#
#   prowlarr:
#     image: lscr.io/linuxserver/prowlarr:latest
#     restart: unless-stopped
#     environment: { PUID: "65534", PGID: "65534", TZ: "Etc/UTC" }
#     volumes: [ "prowlarr_config:/config" ]
#     ports: [ "9696:9696" ]
#
#   qbittorrent:
#     image: lscr.io/linuxserver/qbittorrent:latest
#     restart: unless-stopped
#     environment: { PUID: "65534", PGID: "65534", TZ: "Etc/UTC", WEBUI_PORT: "8080" }
#     volumes:
#       - "qbittorrent_config:/config"
#       - "${MEDIA_ROOT:-./media}:/media"   # SAME mount as cinder -> hardlinks work
#     ports: [ "8080:8080" ]
#
#   jellyfin:
#     image: lscr.io/linuxserver/jellyfin:latest
#     restart: unless-stopped
#     environment: { PUID: "65534", PGID: "65534", TZ: "Etc/UTC" }
#     volumes:
#       - "jellyfin_config:/config"
#       - "${MEDIA_ROOT:-./media}:/media:ro"
#     ports: [ "8096:8096" ]

volumes:
  cinder_data:
  # prowlarr_config:
  # qbittorrent_config:
  # jellyfin_config:
